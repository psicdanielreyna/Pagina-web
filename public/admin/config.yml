backend:
  name: github
  repo: psicdanielreyna/Pagina-web
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

locale: es

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: content/blog
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: /blog/{{slug}}

    fields:

      # ── Metadatos esenciales ──────────────────────────────────────
      - label: Título
        name: title
        widget: string

      - label: Slug (URL)
        name: slug
        widget: string
        required: false
        hint: "Se genera automático. Solo edita si quieres una URL específica. Ej: burnout-por-que-estamos-cansados"

      - label: Fecha de publicación
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        dateFormat: "DD/MM/YYYY"
        timeFormat: false

      - label: Categoría
        name: category
        widget: select
        options:
          - { label: "Psicología y salud mental", value: "psicologia" }
          - { label: "Cultura y entretenimiento", value: "cultura" }
          - { label: "Lifestyle y bienestar", value: "lifestyle" }

      - label: Tags
        name: tags
        widget: list
        required: false
        default: []
        hint: "Palabras clave del post. Ej: burnout, trabajo, salud"

      # ── Imagen y extracto ─────────────────────────────────────────
      - label: Imagen de portada (OG/cover)
        name: image
        widget: image
        required: false
        hint: "⚠️ Mínimo 1200×630px para redes sociales y Google."

      - label: Extracto
        name: excerpt
        widget: text
        required: false
        hint: "1–2 oraciones que resumen el post. Máximo ~160 caracteres. Si se omite, se genera automático del contenido."

      # ── SEO (campos sueltos — requerido por lib/posts.ts) ─────────
      # IMPORTANTE: estos nombres (seoTitle, seoDescription, noindex, nofollow)
      # deben coincidir exactamente con lo que lee lib/posts.ts
      - label: "— SEO (opcional) —"
        name: seo_divider
        widget: hidden
        required: false

      - label: Título SEO
        name: seoTitle
        widget: string
        required: false
        hint: "Diferente al título del post si quieres. Máximo 60 caracteres."

      - label: Descripción SEO
        name: seoDescription
        widget: text
        required: false
        hint: "Texto que aparece bajo el título en Google. Máximo 160 caracteres."

      - label: No indexar
        name: noindex
        widget: boolean
        default: false
        required: false
        hint: "Activa solo si NO quieres que Google indexe este post."

      - label: No seguir enlaces
        name: nofollow
        widget: boolean
        default: false
        required: false

      # ── Contenido ─────────────────────────────────────────────────
      - label: Contenido
        name: body
        widget: markdown
        hint: "Acepta MDX."
